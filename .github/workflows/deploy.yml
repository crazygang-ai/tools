name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Opt every JavaScript-based action into the Node 24 runtime now, instead of
# waiting for the 2026-06-02 forced flip. Silences the "Node.js 20 deprecated"
# annotation on actions/checkout, actions/cache, actions/setup-node, etc.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Required by actions/deploy-pages: write to Pages, mint OIDC token.
permissions:
  contents: read
  pages: write
  id-token: write

# Avoid stacking deploys; let an in-flight run finish, then take the latest.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable pnpm via corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.33.0 --activate
          pnpm -v

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      # BrowserRouter on a static host: GitHub Pages serves 404.html for any
      # unknown path, so making it a copy of index.html lets the SPA take over
      # and React Router resolves the route client-side.
      - name: SPA fallback (404.html = index.html)
        run: cp dist/index.html dist/404.html

      - name: Disable Jekyll
        run: touch dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
