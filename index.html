<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#fcfcfd" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0b0b0d" media="(prefers-color-scheme: dark)" />
    <meta name="color-scheme" content="light dark" />
    <meta
      name="description"
      content="50+ free online developer tools, all running locally in your browser."
    />
    <title>DevTools Cafe</title>
    <script>
      // Apply persisted theme before first paint to avoid FOUC.
      (function () {
        try {
          var stored = localStorage.getItem('devtools-cafe.theme');
          var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var resolved = stored === 'dark' || stored === 'light' ? stored : (prefersDark ? 'dark' : 'light');
          var root = document.documentElement;
          if (resolved === 'dark') root.classList.add('dark');
          root.style.colorScheme = resolved;
        } catch (e) {
          /* localStorage unavailable: fall back to default light */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
